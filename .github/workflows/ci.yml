name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip ".[test,dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy src/prism_eda
      - name: Test
        run: pytest --cov=prism_eda --cov-report=term-missing

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Inspect wheel
        run: python -m zipfile --list dist/prism_eda-*.whl
